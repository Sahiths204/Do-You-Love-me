<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Coffee Date ☕❤️</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .images {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .images div {
      text-align: center;
    }

    .images img {
      width: 220px;
      height: auto;              /* 👈 full image visible */
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Finally you said YES 😍☕</h1>
    <p>Now it's officially OUR coffee date 💖</p>

    <div class="images">
      <div>
        <p>Her 💖</p>
        <img src="/Do-You-Love-me/girl.jpg" alt="Her">
      </div>

      <div>
        <p>Me 😎</p>
        <img src="/Do-You-Love-me/me.jpg" alt="Me">
      </div>
    </div>

    <p style="margin-top:20px;">
      From coding this… to taking you out ☕😌
    </p>

    <p>See you soon 😉✨</p>
  </div>
</body>
</html>
